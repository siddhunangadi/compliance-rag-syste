services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      APP_ENV: production
      FRONTEND_URL: http://localhost:8501
      ALLOWED_ORIGINS: '["http://localhost:8501"]'
      PORT: 8000
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    env_file:
      - .env
    environment:
      BACKEND_URL: http://backend:8000
      PORT: 8501
    depends_on:
      - backend
    ports:
      - "8501:8501"
    restart: unless-stopped
