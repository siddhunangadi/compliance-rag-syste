name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest

    env:
      APP_ENV: testing
      GEMINI_API_KEY: test-gemini-api-key
      PINECONE_API_KEY: test-pinecone-api-key
      PINECONE_INDEX_NAME: test-pinecone-index
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_ANON_KEY: test-supabase-anon-key
      SUPABASE_SERVICE_ROLE_KEY: test-supabase-service-role-key

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile backend
        run: PYTHONPATH=backend python -m compileall -q backend/app

      - name: Run backend tests
        run: PYTHONPATH=backend pytest backend/tests -q

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: backend-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t compliance-rag-backend -f Dockerfile.backend .

      - name: Build frontend image
        run: docker build -t compliance-rag-frontend -f Dockerfile.frontend .
